<!DOCTYPE html>
<html>
    <head>
        <style>
             * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
             }
            body {
                background-color: #121212; 
                font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
                overflow-x: hidden;
            }
            .head {
                border-bottom : 1px rgb(63, 63, 63) solid;
            }
            .logo {
                
                padding: 10px 30px;
                display: flex;
                align-items: center;
                gap: 15px;
            }
            .logo img {
                border: 1px white solid;
                
                background-color: #ffffff; /* Gives your original black logo a clean backing */
                padding: 4px;
                border-radius: 4px;

            }
            .text {
                color: #ffffff;
                letter-spacing: 5px;
                
                font-weight: 700;


            }
            .ret {
                display: flex;
                position: relative;
                letter-spacing: 2px;
                justify-content: right;
                margin-right: 20px;
                

            }
            .ret a {
                color: #ffffff;
                text-decoration: none !important;
                border: 1px rgba(255, 255, 255, 0.2) solid ;
                border-radius: 4px;
                padding: 10px 24px;
                transition: all 0.3s ease;
                text-transform: uppercase;
                position: relative;
                bottom: 75px;
            }
            .ret a:hover {
                background-color: #ffffff;
                color: #121212 !important;
                border-color: #ffffff;
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            }
            .imp {
                display: flex;
                justify-content: space-between;
            }
            .product {
                margin: 50px 40px  ;
                display: flex;
                
                
            }
            .price {
                color: #ffffff;
                font-size: xx-large;
                margin-top: 50px;
                margin-right: 20px;
                margin-bottom: 50px;
                
            }
            .or {
                margin-top: 200px;
                padding-right: 40px;
            }
           
            .order {
                
                color: black;
                text-decoration: none;
                border: 1px rgb(0, 0, 0) solid ;
                background-color: #ffffff;
                border-radius: 4px;
                padding: 10px 24px;
                transition: all 0.3s ease;
                text-transform: uppercase;
                letter-spacing: 5px;
            }
            .order:hover {
                background-color: black;
                color: white!important;
                border-color: #ffffff;
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            }
            
            
        </style>
        <title>PYSTANT | CELERTAIL</title>
        

    </head>
    <body>
        <div class="head">
            <div class="logo">
                <img class="logo" src="black logo.jpg" width="120" />
                <h2 class="text">SHOP</h2>
            </div>
            <div class="ret">
                <a href="shop3.html">RETURN BACK</a>
            </div>
        </div>
        <div class="imp">
            <div class="product">
                <img src="greek pystant.jpg" />
            </div>
            <div class="price">
                <h1>249.99 EGP</h1>
                <div class="or">
                    <a class="order" href="https://wa.me/01201912508?text=i want to order this product celertail">ORDER NOW</a>

                </div>
                
            </div>
            
            
        </div>

    </body>
</html>
