<!DOCTYPE html>
<html>
<head>
    <title>CONTACTS | PYSTANT</title>
    <style>
        /* Modern CSS Reset & Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212; /* Matches premium main shop background */
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* 1. CLEAN HEADER (Matches Main Page Design) */
        .back {
            background-color: rgba(18, 18, 18, 0.95);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Original Logo Preservation */
        .back img {
            width: 120px;
            height: auto;
            background-color: #ffffff; 
            padding: 5px;
            border-radius: 4px;
            display: block;
        }

        .con h1 {
            color: #ffffff;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* 2. DYNAMIC SOCIAL CONTAINER CONTAINER (No Absolute Breakages) */
        .social-section {
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 40px;
            text-align: center;
        }

        .social-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap; /* Wraps cleanly on mobile */
            margin-top: 40px;
        }

        .social-grid a {
            display: block;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* High-End Hover Micro-Interactions */
        .social-grid a:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px rgba(255, 255, 255, 0.1);
        }

        .social-grid img {
            display: block;
            width: 100%;
            max-width: 480px; /* Clean standard sizes */
            height: auto;
            object-fit: cover;
        }

        /* 3. IMMERSIVE EDITORIAL FOOTER */
        .footer-banner {
            position: relative;
            width: 100%;
            height: 300px; /* Elevated height for editorial presence */
            margin-top: 100px;
            overflow: hidden;
        }

        /* The Moon Background Layer */
        .end {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6); /* darkens slightly so text pops clearly */
        }

        /* The Overlay Text Container */
        .endtitle {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to top, rgba(18,18,18,1) 0%, rgba(18,18,18,0) 100%);
        }

        .endtitle h2 {
            color: #ffffff;
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 15px;
            text-indent: 15px; /* Keeps text perfectly centered */
            text-transform: uppercase;
            text-align: center;
        }
        
        .homepage {
            text-decoration: none !important;
            color: rgb(255, 255, 255) !important;
            background-color: rgba(0, 0, 0,);
            letter-spacing: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            gap: 30px;
            padding: 10px 24px;
            transition: all 0.3s ease;
        }
        .homepage:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px rgba(255, 255, 255, 0.1);
            background-color: white !important;
            color: #121212 !important;
            border-color: #ffffff;
        }

        @media (max-width: 768px) {
            .endtitle h2 {
                font-size: 2rem;
                letter-spacing: 8px;
            }
        }
    </style>
</head>
<body>

    <div class="back">
        <img src="black logo.jpg" alt="PYSTANT LOGO" />
        <div class="con">
            <h1>CONTACTS</h1>
        </div>
        <div>
            <a class="homepage" href="index.html">HOME</a>
        </div>
    </div>

    <div class="social-section">
        <div class="social-grid">
            
            <a href="https://wa.me/qr/ANO56WLJOWUKJ1" target="_blank">
                <img src="whast app.png" alt="WhatsApp Link" />
            </a>
            
            <a href="https://www.instagram.com/pystant.eg?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank">
                <img src="instgram.jpg" alt="Instagram Link" />
            </a>

        </div>
    </div>

    <div class="footer-banner">
        <img class="end" src="moon.jpg" alt="Moon Visual Accent" />
        <div class="endtitle">
            <h2>WE ARE THE BEST</h2>
        </div>
    </div>

</body>
</html>
