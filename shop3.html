        <style>
           
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background-color: #121212;
                font-family: fantasy, sans-serif;
                overflow-x: hidden;
            }

           
            .head {
                position: relative;
                text-align: center;
                padding: 20px 0;
            }

            .head img {
                display: block;
                margin: auto 30px;
            }

            .head hr {
                border: 0;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                margin: 15px 0;
            }

            .head h1 {
                color: white;
                letter-spacing: 10px;
                font-size: 100px;
                display: flex;
                justify-content: center;
                align-items: center;
            }

          
            .nav-btn {
                text-decoration: none !important;
                color: rgb(255, 255, 255) !important;
                background-color: transparent; 
                letter-spacing: 6px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 4px;
                padding: 10px 24px;
                transition: all 0.3s ease;
                position: absolute;
                top: 57px;
            }

            .home {
                right: 50px;
            }

            .contact {
                right: 180px;
            }

            .nav-btn:hover {
                background-color: white !important;
                color: #121212 !important;
                border-color: #ffffff;
                transform: translateY(-2px);
            }

           
            .bord {
                max-width: 851px;
                margin: 40px auto;
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            .bord a {
                display: block;
                text-decoration: none;
            }

           
            .shop-img {
                width: 100%;
                max-width: 851px;
                height: 255.77px;
                object-fit: cover;
                border-radius: 60px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.5);
                transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
                display: block;
            }

            .shop-img:hover {
                transform: translateY(-10px) scale(1.02);
                box-shadow: 0 30px 60px rgba(255, 255, 255, 0.15);
            }
        </style>
    </head>
